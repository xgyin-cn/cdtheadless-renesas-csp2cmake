name: Create tag and release from version bump

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  create-release:
    name: Create tag and GitHub release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Extract version from push commits
        id: extract_version
        run: |
          echo "Scanning commit messages for version bump..."
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            range="${{ github.sha }}"
          else
            range="${{ github.event.before }}..${{ github.sha }}"
          fi
          version=$(git log --format=%B --no-merges "$range" | grep -oE '更新版本号至[[:space:]]*([0-9]+\.[0-9]+\.[0-9]+)' | grep -oE '([0-9]+\.[0-9]+\.[0-9]+)' | tail -n1)
          if [ -n "$version" ]; then
            echo "version=$version" >> "$GITHUB_OUTPUT"
          else
            echo "version=" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if no version bump found
        if: steps.extract_version.outputs.version == ''
        run: |
          echo "跳过：本次 push 中没有匹配 '更新版本号至*.*.*' 的提交消息。"

      - name: Create tag
        if: steps.extract_version.outputs.version != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          tag="v${{ steps.extract_version.outputs.version }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag 已存在，跳过创建。"
          else
            git tag -a "$tag" -m "Release $tag"
            git push origin "$tag"
          fi

      - name: Create GitHub release
        if: steps.extract_version.outputs.version != ''
        uses: actions/create-release@v1
        with:
          tag_name: "v${{ steps.extract_version.outputs.version }}"
          release_name: "Release v${{ steps.extract_version.outputs.version }}"
          body: "自动创建的发行版，来自 commit 消息中的版本号更新。"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        if: steps.extract_version.outputs.version != ''
        run: npm ci

      - name: Publish VS Code extension
        if: steps.extract_version.outputs.version != ''
        run: npx @vscode/vsce publish --pat "$VSCODE_MARKETPLACE_TOKEN"
        env:
          VSCODE_MARKETPLACE_TOKEN: ${{ secrets.VSCODE_MARKETPLACE_TOKEN }}
